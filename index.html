<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

  <title>Frontend Mentor | Intro component with sign up form</title>
  <link rel="stylesheet" href="style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
    rel="stylesheet">

</head>

<body>
  <main>

    <div class="description">
      <h1>Learn to code by watching others</h1>

      <p>See how experienced developers solve problems in real-time. Watching scripted tutorials is great,
        but understanding how developers think is invaluable. </p>
    </div>
    <div class="information">
      <div class="proposition"> <span>Try it free 7 days&nbsp;</span>then $20/mo. thereafter</div>
      <div class="paper">
        <form>
          <div class="inputGroup"> <input type="text" name="firstName" placeholder="First Name" id="firstName"><img
              src="./images/icon-error.svg" class="hidden"> <label for="firstName"></label> </div>
          <div class="inputGroup"> <input type="text" name="lastName" placeholder="Last Name" id="lastName"><img
              src="./images/icon-error.svg" class="hidden"><label for="lastName"></label> </div>
          <div class="inputGroup"> <input type="email" name="emailAddress" placeholder="Email Address"
              id="emailAddress"><img src="./images/icon-error.svg" class="hidden"><label for="emailAddress"></label> </div>
          <div class="inputGroup"> <input type="password" name="password" placeholder="Password" id="password"><img
              src="./images/icon-error.svg" class="hidden"><label for="password"></label> </div>

          <input type="submit" class="claim" value="Claim your free trial"></input>

        </form>




        <div class="additionalDescription">By clicking the button, you are agreeing to our <span>Terms and
            Services</span></div>
      </div>

    </div>

  </main>

  <script src="index.js" charset="UTF-8"></script>
</body>

</html>
